<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actor Roster</title>
<style>
  :root {
    --bg: #f4f2ee;
    --card: #ffffff;
    --ink: #2b2a28;
    --muted: #8a8578;
    --accent: #9a3b3b;
    --accent-soft: #f3e4e4;
    --line: #e6e2d9;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(43,42,40,.08), 0 4px 14px rgba(43,42,40,.05);
    --shadow-lg: 0 4px 10px rgba(43,42,40,.10), 0 14px 40px rgba(43,42,40,.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ---------- Lock screen ---------- */
  #lockScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .lock-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 40px 36px;
    width: min(380px, 100%);
    text-align: center;
  }
  .lock-card .mask { font-size: 40px; margin-bottom: 12px; }
  .lock-card h1 { font-size: 21px; margin-bottom: 6px; letter-spacing: -0.01em; }
  .lock-card h1 span { color: var(--accent); }
  .lock-card p { font-size: 13.5px; color: var(--muted); margin-bottom: 22px; }
  .lock-card input[type=password] {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    text-align: center;
    transition: border-color .15s;
  }
  .lock-card input[type=password]:focus { border-color: var(--accent); }
  .lock-remember {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin: 14px 0 18px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .lock-remember input { accent-color: var(--accent); }
  .lock-error {
    color: var(--accent);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }

  /* ---------- Header ---------- */
  header {
    max-width: 1060px;
    margin: 0 auto;
    padding: 40px 24px 20px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-right: auto;
  }
  header h1 span { color: var(--accent); }
  .search-wrap { position: relative; }
  .search-wrap input {
    padding: 10px 14px 10px 36px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    font-size: 14px;
    width: 220px;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: "⌕";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-54%);
    font-size: 17px;
    color: var(--muted);
    pointer-events: none;
  }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: filter .15s, background .15s;
    font-family: inherit;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { color: var(--ink); background: var(--card); }
  .btn-danger { background: transparent; color: var(--accent); border: 1px solid var(--accent-soft); }
  .btn-danger:hover { background: var(--accent-soft); }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  /* ---------- Card grid ---------- */
  main {
    max-width: 1060px;
    margin: 0 auto;
    padding: 8px 24px 80px;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
    align-items: start;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    cursor: pointer;
    overflow: hidden;
    transition: box-shadow .2s, border-color .2s;
  }
  .card:hover { box-shadow: var(--shadow-lg); }
  .card.open { border-color: var(--accent); grid-column: 1 / -1; cursor: default; }

  .card-top { padding: 20px 22px 18px; }
  .card.open .card-top { cursor: pointer; }
  .card-name-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }
  .card-name {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .card.open .chevron { transform: rotate(180deg); }
  .card-email {
    display: inline-block;
    margin-top: 6px;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
  }
  .card-email:hover { text-decoration: underline; }
  .card-phone {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  /* ---------- Expanded detail ---------- */
  .card-detail {
    display: none;
    border-top: 1px solid var(--line);
    padding: 18px 22px 22px;
    background: #fdfcfa;
  }
  .card.open .card-detail { display: block; }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px 24px;
    margin-bottom: 4px;
  }
  .field-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .field-value { font-size: 14.5px; }
  .field-value.empty { color: var(--muted); font-style: italic; }

  .scene-section { margin-top: 20px; }
  .scene-section .field-label { margin-bottom: 10px; }
  table.scenes {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  table.scenes th {
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    padding: 9px 12px;
    background: #faf8f4;
    border-bottom: 1px solid var(--line);
  }
  table.scenes td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  table.scenes tr:last-child td { border-bottom: none; }
  .no-scenes { color: var(--muted); font-style: italic; font-size: 14px; }

  .card-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  /* ---------- Empty state ---------- */
  #empty {
    text-align: center;
    padding: 90px 20px;
    color: var(--muted);
  }
  #empty .mask { font-size: 44px; margin-bottom: 14px; }
  #empty p { font-size: 15px; margin-bottom: 20px; }

  /* ---------- Modal ---------- */
  dialog {
    border: none;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 0;
    width: min(640px, calc(100vw - 32px));
    max-height: 88vh;
  }
  dialog::backdrop { background: rgba(43,42,40,.45); }
  .modal-body { padding: 28px 30px 30px; }
  .modal-body h2 { font-size: 20px; margin-bottom: 22px; letter-spacing: -0.01em; }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 16px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  label.f {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
  }
  input.f, textarea.f {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 9px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
    background: #fff;
  }
  input.f:focus, textarea.f:focus { border-color: var(--accent); }

  .scene-editor { margin-top: 26px; }
  .scene-editor-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .scene-editor-head h3 { font-size: 14px; font-weight: 700; }
  .scene-row {
    display: grid;
    grid-template-columns: 1.3fr 1fr 0.8fr 0.55fr 0.55fr 30px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .scene-row input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
  }
  .scene-row input:focus { border-color: var(--accent); }
  .scene-row-labels {
    display: grid;
    grid-template-columns: 1.3fr 1fr 0.8fr 0.55fr 0.55fr 30px;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .remove-scene {
    border: none;
    background: none;
    color: var(--muted);
    font-size: 17px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .remove-scene:hover { color: var(--accent); }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 28px;
  }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    .scene-row, .scene-row-labels { grid-template-columns: 1fr 1fr; }
    .scene-row-labels { display: none; }
    header h1 { width: 100%; }
    .search-wrap input { width: 100%; }
  }
</style>
</head>
<body>

<div id="lockScreen">
  <form class="lock-card" id="lockForm">
    <div class="mask">🎭</div>
    <h1>Actor <span>Roster</span></h1>
    <p>Enter the roster password to continue.</p>
    <input type="password" id="lockPass" placeholder="Password" autocomplete="current-password" required>
    <label class="lock-remember">
      <input type="checkbox" id="lockRemember" checked>
      Remember this device
    </label>
    <button type="submit" class="btn btn-primary" style="width:100%">Unlock</button>
    <div class="lock-error" id="lockError"></div>
  </form>
</div>

<header hidden id="appHeader">
  <h1>Actor <span>Roster</span></h1>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search by name…" aria-label="Search actors">
  </div>
  <button class="btn btn-primary" id="addBtn">+ Add Actor</button>
  <button class="btn btn-ghost" id="lockBtn" title="Forget this device and lock the roster">Lock</button>
</header>

<main hidden id="appMain">
  <div id="grid"></div>
  <div id="empty" hidden>
    <div class="mask">🎭</div>
    <p>No actors yet. Add your first one to get started.</p>
    <button class="btn btn-primary" onclick="openForm()">+ Add Actor</button>
  </div>
</main>

<dialog id="modal">
  <form class="modal-body" id="actorForm" method="dialog">
    <h2 id="modalTitle">Add Actor</h2>

    <div class="form-grid">
      <div class="full">
        <label class="f" for="fName">Name *</label>
        <input class="f" id="fName" required autocomplete="off">
      </div>
      <div>
        <label class="f" for="fEmail">Email</label>
        <input class="f" id="fEmail" type="email" autocomplete="off">
      </div>
      <div>
        <label class="f" for="fPhone">Phone</label>
        <input class="f" id="fPhone" type="tel" autocomplete="off">
      </div>
      <div>
        <label class="f" for="fDob">Date of Birth</label>
        <input class="f" id="fDob" type="date">
      </div>
      <div>
        <label class="f" for="fAddress">Address</label>
        <input class="f" id="fAddress" autocomplete="off">
      </div>
    </div>

    <div class="scene-editor">
      <div class="scene-editor-head">
        <h3>Scene Study</h3>
        <button type="button" class="btn btn-ghost btn-sm" id="addSceneBtn">+ Add Scene</button>
      </div>
      <div class="scene-row-labels" id="sceneLabels" hidden>
        <span>Play</span><span>Character</span><span>Scene</span><span>Pg Start</span><span>Pg Stop</span><span></span>
      </div>
      <div id="sceneRows"></div>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
    </div>
  </form>
</dialog>

const DATA_KEY = "actorRoster.v2";      // encrypted local edits
const DEVICE_KEY = "actorRoster.devKey"; // remembered device key (raw AES key)
const LEGACY_KEY = "actorRoster.v1";     // pre-encryption plaintext storage

let cryptoKey = null;
let actors = [];
let editingId = null;   // id of actor being edited, or null when adding
let openId = null;      // id of currently expanded card

const b64e = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(passphrase) {
  const base = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64d(VAULT.salt), iterations: VAULT.iterations, hash: "SHA-256" },
    base, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
}
async function decryptBlob(key, blob) {
  const buf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64d(blob.iv) }, key, b64d(blob.data));
  return JSON.parse(new TextDecoder().decode(buf));
}
async function encryptBlob(key, obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv }, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { iv: b64e(iv), data: b64e(data) };
}

// Throws if the key can decrypt neither the local edits nor the shipped vault.
async function loadRoster(key) {
  let seed = null, seedError = null;
  try { seed = await decryptBlob(key, VAULT); } catch (e) { seedError = e; }

  const storedRaw = localStorage.getItem(DATA_KEY);
  if (storedRaw) {
    try { return await decryptBlob(key, JSON.parse(storedRaw)); } catch {}
  }
  if (seed === null) throw seedError;

  // One-time migration of pre-encryption plaintext data
  try {
    const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY));
    localStorage.removeItem(LEGACY_KEY);
    if (Array.isArray(legacy) && legacy.length) return legacy;
  } catch {}
  return seed;
}

async function save() {
  localStorage.setItem(DATA_KEY, JSON.stringify(await encryptBlob(cryptoKey, actors)));
}

async function startSession(key, remember) {
  actors = await loadRoster(key);
  cryptoKey = key;
  if (remember) {
    localStorage.setItem(DEVICE_KEY, b64e(await crypto.subtle.exportKey("raw", key)));
  }
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("appHeader").hidden = false;
  document.getElementById("appMain").hidden = false;
  render();
}

const lockForm = document.getElementById("lockForm");
lockForm.addEventListener("submit", async e => {
  e.preventDefault();
  const errEl = document.getElementById("lockError");
  errEl.textContent = "";
  try {
    const key = await deriveKey(document.getElementById("lockPass").value);
    await startSession(key, document.getElementById("lockRemember").checked);
  } catch {
    errEl.textContent = "Incorrect password. Please try again.";
    document.getElementById("lockPass").select();
  }
});

document.getElementById("lockBtn").addEventListener("click", () => {
  localStorage.removeItem(DEVICE_KEY);
  location.reload();
});

// Auto-unlock if this device was remembered
(async () => {
  const raw = localStorage.getItem(DEVICE_KEY);
  if (!raw) {
    document.getElementById("lockPass").focus();
    return;
  }
  try {
    const key = await crypto.subtle.importKey(
      "raw", b64d(raw), { name: "AES-GCM" }, true, ["encrypt", "decrypt"]);
    await startSession(key, false);
  } catch {
    localStorage.removeItem(DEVICE_KEY);
    document.getElementById("lockPass").focus();
  }
})();

/* ================= App ================= */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmtDob(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-").map(Number);
  if (!y || !m || !d) return iso;
  return new Date(y, m - 1, d).toLocaleDateString(undefined, {
    year: "numeric", month: "long", day: "numeric"
  });
}
function fmtPages(sc) {
  if (sc.pageStart && sc.pageStop) return sc.pageStart + "–" + sc.pageStop;
  return sc.pageStart || sc.pageStop || "—";
}

/* ---------- Rendering ---------- */
const grid = document.getElementById("grid");
const emptyState = document.getElementById("empty");
const searchInput = document.getElementById("search");

function render() {
  const q = searchInput.value.trim().toLowerCase();
  const list = actors
    .filter(a => !q || a.name.toLowerCase().includes(q))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: "base" }));

  emptyState.hidden = actors.length > 0;
  grid.innerHTML = list.map(a => cardHTML(a)).join("");

  if (actors.length > 0 && list.length === 0) {
    grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1;padding:30px 0;text-align:center;">No actors match your search.</p>';
  }
}

function cardHTML(a) {
  const open = a.id === openId;
  return `
  <article class="card ${open ? "open" : ""}" data-id="${a.id}">
    <div class="card-top" data-toggle>
      <div class="card-name-row">
        <div class="card-name">${esc(a.name)}</div>
        <span class="chevron">▼</span>
      </div>
      ${a.email ? `<a class="card-email" href="mailto:${esc(a.email)}" onclick="event.stopPropagation()">${esc(a.email)}</a>` : ""}
      ${a.phone ? `<div class="card-phone">${esc(a.phone)}</div>` : ""}
    </div>
    ${open ? detailHTML(a) : ""}
  </article>`;
}

function detailHTML(a) {
  const scenes = a.scenes || [];
  return `
  <div class="card-detail">
    <div class="detail-grid">
      <div>
        <div class="field-label">Address</div>
        <div class="field-value ${a.address ? "" : "empty"}">${esc(a.address) || "Not provided"}</div>
      </div>
      <div>
        <div class="field-label">Date of Birth</div>
        <div class="field-value ${a.dob ? "" : "empty"}">${esc(fmtDob(a.dob)) || "Not provided"}</div>
      </div>
      <div>
        <div class="field-label">Phone</div>
        <div class="field-value ${a.phone ? "" : "empty"}">${esc(a.phone) || "Not provided"}</div>
      </div>
    </div>

    <div class="scene-section">
      <div class="field-label">Scene Study</div>
      ${scenes.length ? `
      <table class="scenes">
        <thead>
          <tr><th>Play</th><th>Character</th><th>Scene</th><th>Pages</th></tr>
        </thead>
        <tbody>
          ${scenes.map(sc => `
          <tr>
            <td>${esc(sc.play) || "—"}</td>
            <td>${esc(sc.character) || "—"}</td>
            <td>${esc(sc.scene) || "—"}</td>
            <td>${esc(fmtPages(sc))}</td>
          </tr>`).join("")}
        </tbody>
      </table>` : `<div class="no-scenes">No scenes recorded.</div>`}
    </div>

    <div class="card-actions">
      <button class="btn btn-ghost btn-sm" data-edit>Edit</button>
      <button class="btn btn-danger btn-sm" data-delete>Delete</button>
    </div>
  </div>`;
}

/* ---------- Card interactions (event delegation) ---------- */
grid.addEventListener("click", e => {
  const card = e.target.closest(".card");
  if (!card) return;
  const id = card.dataset.id;

  if (e.target.closest("[data-edit]")) {
    openForm(id);
    return;
  }
  if (e.target.closest("[data-delete]")) {
    const actor = actors.find(a => a.id === id);
    if (confirm(`Delete ${actor.name}? This cannot be undone.`)) {
      actors = actors.filter(a => a.id !== id);
      if (openId === id) openId = null;
      save();
      render();
    }
    return;
  }
  if (e.target.closest("[data-toggle]")) {
    openId = openId === id ? null : id;
    render();
  }
});

searchInput.addEventListener("input", render);

/* ---------- Modal form ---------- */
const modal = document.getElementById("modal");
const form = document.getElementById("actorForm");
const sceneRows = document.getElementById("sceneRows");
const sceneLabels = document.getElementById("sceneLabels");

function openForm(id = null) {
  editingId = id;
  const a = id ? actors.find(x => x.id === id) : null;
  document.getElementById("modalTitle").textContent = a ? "Edit Actor" : "Add Actor";
  document.getElementById("fName").value = a?.name || "";
  document.getElementById("fEmail").value = a?.email || "";
  document.getElementById("fPhone").value = a?.phone || "";
  document.getElementById("fDob").value = a?.dob || "";
  document.getElementById("fAddress").value = a?.address || "";
  sceneRows.innerHTML = "";
  (a?.scenes || []).forEach(addSceneRow);
  updateSceneLabels();
  modal.showModal();
  document.getElementById("fName").focus();
}

function addSceneRow(sc = {}) {
  const row = document.createElement("div");
  row.className = "scene-row";
  row.innerHTML = `
    <input placeholder="Play" data-k="play" value="${esc(sc.play || "")}">
    <input placeholder="Character" data-k="character" value="${esc(sc.character || "")}">
    <input placeholder="Scene" data-k="scene" value="${esc(sc.scene || "")}">
    <input placeholder="Start" data-k="pageStart" value="${esc(sc.pageStart || "")}">
    <input placeholder="Stop" data-k="pageStop" value="${esc(sc.pageStop || "")}">
    <button type="button" class="remove-scene" title="Remove scene" aria-label="Remove scene">✕</button>`;
  row.querySelector(".remove-scene").addEventListener("click", () => {
    row.remove();
    updateSceneLabels();
  });
  sceneRows.appendChild(row);
  updateSceneLabels();
}

function updateSceneLabels() {
  sceneLabels.hidden = sceneRows.children.length === 0;
}

document.getElementById("addSceneBtn").addEventListener("click", () => {
  addSceneRow();
  sceneRows.lastElementChild.querySelector("input").focus();
});

document.getElementById("addBtn").addEventListener("click", () => openForm());
document.getElementById("cancelBtn").addEventListener("click", () => modal.close());

form.addEventListener("submit", e => {
  e.preventDefault();
  const name = document.getElementById("fName").value.trim();
  if (!name) return;

  const scenes = [...sceneRows.children].map(row => {
    const sc = {};
    row.querySelectorAll("input").forEach(inp => sc[inp.dataset.k] = inp.value.trim());
    return sc;
  }).filter(sc => Object.values(sc).some(v => v));

  const data = {
    name,
    email: document.getElementById("fEmail").value.trim(),
    phone: document.getElementById("fPhone").value.trim(),
    dob: document.getElementById("fDob").value,
    address: document.getElementById("fAddress").value.trim(),
    scenes
  };

  if (editingId) {
    const a = actors.find(x => x.id === editingId);
    Object.assign(a, data);
  } else {
    const id = uid();
    actors.push({ id, ...data });
    openId = id;
  }
  save();
  modal.close();
  render();
});

// Close modal when clicking the backdrop
modal.addEventListener("click", e => {
  if (e.target === modal) modal.close();
});
</script>
</body>
</html>
